<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Ultimate Weather App</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

min-height:100vh;

padding:20px;

color:white;

background:
linear-gradient(to right,#1d4350,#a43931);

overflow-x:hidden;

transition:0.5s;
}

/* Animated Background */

body::before{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:url('https://i.gifer.com/7scP.gif');

background-size:cover;

opacity:0.12;

z-index:-1;

pointer-events:none;
}

/* Dark Mode */

.dark{

background:black;
}

/* Container */

.container{

max-width:1300px;

margin:auto;
}

/* App */

.app{

background:rgba(255,255,255,0.12);

backdrop-filter:blur(18px);

border-radius:30px;

padding:25px;

box-shadow:
0 8px 32px rgba(0,0,0,0.3);
}

/* Title */

.title{

text-align:center;

font-size:42px;

font-weight:700;

margin-bottom:25px;
}

/* Search */

.search-box{

display:flex;

gap:10px;

flex-wrap:wrap;

margin-bottom:25px;
}

.search-box input{

flex:1;

padding:16px;

border:none;

border-radius:14px;

font-size:18px;

outline:none;
}

.search-box button{

padding:16px 20px;

border:none;

border-radius:14px;

cursor:pointer;

font-size:16px;

font-weight:600;

transition:0.3s;
}

.search-box button:hover{

transform:scale(1.05);
}

#search-btn{
background:#00b894;
color:white;
}

#location-btn{
background:#0984e3;
color:white;
}

#dark-btn{
background:#2d3436;
color:white;
}

/* Weather Section */

.weather{
display:none;
}

/* Top */

.top{

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:20px;
}

/* Temp */

.temp{

font-size:90px;

font-weight:700;

margin-top:10px;
}

/* Condition */

.condition{

font-size:26px;

margin-top:10px;
}

/* Icon */

.main-icon img{

width:130px;
}

/* Cards */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-top:30px;
}

.card{

background:rgba(255,255,255,0.18);

padding:22px;

border-radius:24px;

text-align:center;

backdrop-filter:blur(12px);

box-shadow:
0 8px 20px rgba(0,0,0,0.2);

transition:0.4s;
}

.card:hover{

transform:
translateY(-8px)
scale(1.03);
}

.card h3{

margin-bottom:15px;
}

/* Forecast */

.forecast-container,
.hourly-container{

display:flex;

gap:15px;

overflow-x:auto;

padding-bottom:10px;

margin-top:20px;
}

.forecast-card,
.hour-card{

min-width:150px;

background:rgba(255,255,255,0.15);

padding:15px;

border-radius:18px;

text-align:center;

backdrop-filter:blur(10px);

box-shadow:
0 4px 20px rgba(255,255,255,0.15);

transition:0.3s;
}

.forecast-card:hover,
.hour-card:hover{

transform:scale(1.05);
}

.forecast-card img,
.hour-card img{

width:60px;
}

/* Scrollbar */

.forecast-container::-webkit-scrollbar,
.hourly-container::-webkit-scrollbar{

height:8px;
}

.forecast-container::-webkit-scrollbar-thumb,
.hourly-container::-webkit-scrollbar-thumb{

background:white;

border-radius:20px;
}

/* Chart */

canvas{

margin-top:30px;

background:white;

border-radius:20px;

padding:15px;
}

/* Map */

#map{

height:400px;

width:100%;

margin-top:25px;

border-radius:20px;

overflow:hidden;
}

/* Responsive */

@media(max-width:768px){

.title{
font-size:30px;
}

.temp{
font-size:60px;
}

.search-box{
flex-direction:column;
}

.search-box button{
width:100%;
}

.top{
flex-direction:column;
align-items:flex-start;
}

.main-icon img{
width:90px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="app">

<h1 class="title">
Ultimate Weather App
</h1>

<div class="search-box">

<input
type="text"
id="city"
placeholder="Enter city name">

<button id="search-btn">
Search
</button>

<button id="location-btn">
My Location
</button>

<button id="dark-btn">
Dark Mode
</button>

</div>

<div
class="weather"
id="weather">
</div>

</div>

</div>

<script>

const apiKey =
"9b14b2cbfdfa41f6b63172731261605";

const cityInput =
document.getElementById("city");

const weather =
document.getElementById("weather");

let weatherChart;
let map;

/* Search */

document.getElementById(
"search-btn"
).addEventListener("click",()=>{

if(cityInput.value.trim() !== ""){

getWeather(cityInput.value);

}

});

/* Enter Key */

cityInput.addEventListener(
"keypress",
(e)=>{

if(e.key === "Enter"){

getWeather(cityInput.value);

}

}
);

/* Dark Mode */

document.getElementById(
"dark-btn"
).addEventListener("click",()=>{

document.body.classList.toggle("dark");

});

/* My Location */

document.getElementById(
"location-btn"
).addEventListener("click",()=>{

navigator.geolocation.getCurrentPosition(

(position)=>{

const lat =
position.coords.latitude;

const lon =
position.coords.longitude;

getWeather(`${lat},${lon}`);

}

);

});

/* Get Weather */

function getWeather(city){

weather.style.display = "block";

weather.innerHTML =
"<h2>Loading Weather...</h2>";

fetch(
`https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${city}&days=7&aqi=yes`
)

.then(response=>response.json())

.then(data=>{

if(data.error){

alert(data.error.message);

return;

}

showWeather(data);

})

.catch(()=>{

alert("Failed to fetch weather");

});

}

/* Show Weather */

function showWeather(data){

const current =
data.current;

const location =
data.location;

const forecast =
data.forecast.forecastday;

/* Dynamic Background */

changeBackground(
current.condition.text
);

weather.innerHTML = `

<div class="top">

<div>

<h2>
${location.name},
${location.country}
</h2>

<p>
${location.localtime}
</p>

<div class="temp">
${current.temp_c}°C
</div>

<div class="condition">
${current.condition.text}
</div>

</div>

<div class="main-icon">

<img src="https:${current.condition.icon}">

</div>

</div>

<div class="grid">

<div class="card">
<h3>Humidity</h3>
<p>${current.humidity}%</p>
</div>

<div class="card">
<h3>Wind</h3>
<p>${current.wind_kph} KM/H</p>
</div>

<div class="card">
<h3>Pressure</h3>
<p>${current.pressure_mb} mb</p>
</div>

<div class="card">
<h3>UV Index</h3>
<p>${current.uv}</p>
</div>

<div class="card">
<h3>Air Quality</h3>
<p>
${current.air_quality
? Math.round(current.air_quality.pm2_5)
: "N/A"}
</p>
</div>

<div class="card">
<h3>Sunrise</h3>
<p>${forecast[0].astro.sunrise}</p>
</div>

<div class="card">
<h3>Sunset</h3>
<p>${forecast[0].astro.sunset}</p>
</div>

</div>

<h2 style="margin-top:35px;">
24 Hour Forecast
</h2>

<div
class="hourly-container"
id="hourly-container">
</div>

<h2 style="margin-top:35px;">
7 Day Forecast
</h2>

<div class="forecast-container">

${forecast.map(day=>`

<div class="forecast-card">

<h3>

${new Date(day.date)
.toLocaleDateString(
'en-US',
{weekday:'short'}
)}

</h3>

<img
src="https:${day.day.condition.icon}">

<p>
${day.day.avgtemp_c}°C
</p>

<p>
${day.day.condition.text}
</p>

</div>

`).join("")}

</div>

<canvas id="tempChart"></canvas>

<h2 style="margin-top:35px;">
Live Weather Map
</h2>

<div id="map"></div>
`;

showHourly(
forecast[0].hour
);

createChart(
forecast
);

loadMap(
location.lat,
location.lon
);

}

/* Hourly Forecast */

function showHourly(hourData){

const container =
document.getElementById(
"hourly-container"
);

container.innerHTML = "";

hourData.slice(0,24)
.forEach(hour=>{

let time =
hour.time.split(" ")[1];

container.innerHTML += `

<div class="hour-card">

<h3>
${time}
</h3>

<img
src="https:${hour.condition.icon}">

<p>
${hour.temp_c}°C
</p>

<p>
Rain:
${hour.chance_of_rain}%
</p>

</div>
`;

});

}

/* Chart */

function createChart(forecast){

const labels =
forecast.map(day=>

new Date(day.date)
.toLocaleDateString(
'en-US',
{weekday:'short'}
)

);

const temps =
forecast.map(day=>
day.day.avgtemp_c
);

if(weatherChart){

weatherChart.destroy();

}

weatherChart =
new Chart(

document.getElementById(
"tempChart"
),

{

type:'line',

data:{

labels:labels,

datasets:[{

label:'Temperature °C',

data:temps,

borderWidth:4,

tension:0.5,

fill:true

}]

},

options:{

responsive:true,

plugins:{

legend:{

labels:{

color:'black',

font:{
size:16
}

}

}

},

scales:{

x:{
ticks:{
color:'black'
}
},

y:{
ticks:{
color:'black'
}
}

}

}

}

);

}

/* Map */

function loadMap(lat,lon){

if(map){

map.remove();

}

map =
L.map('map')
.setView([lat, lon], 8);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{
attribution:'© OpenStreetMap'
}

).addTo(map);

L.marker([lat, lon])

.addTo(map)

.bindPopup("Weather Location")

.openPopup();

}

/* Dynamic Background */

function changeBackground(condition){

condition =
condition.toLowerCase();

if(condition.includes("rain")){

document.body.style.background =
"linear-gradient(to right,#4b79a1,#283e51)";

}

else if(condition.includes("cloud")){

document.body.style.background =
"linear-gradient(to right,#757f9a,#d7dde8)";

}

else if(condition.includes("clear")){

document.body.style.background =
"linear-gradient(to right,#56ccf2,#2f80ed)";

}

else if(condition.includes("snow")){

document.body.style.background =
"linear-gradient(to right,#e6dada,#274046)";

}

else{

document.body.style.background =
"linear-gradient(to right,#1d4350,#a43931)";

}

}

/* Auto Load Weather */

window.onload = ()=>{

navigator.geolocation.getCurrentPosition(

(position)=>{

const lat =
position.coords.latitude;

const lon =
position.coords.longitude;

getWeather(`${lat},${lon}`);

}

);

};

</script>

</body>

</html>
