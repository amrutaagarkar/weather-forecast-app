<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Advanced Weather App</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="clear">

  <div class="container">

    <h1 class="app-title">
      Weather Forecast App
    </h1>

    <!-- SEARCH -->

    <div class="search-box">

      <input
        type="text"
        id="city"
        placeholder="Enter city name"
      >

      <button onclick="getWeather()">
        Search
      </button>

    </div>

    <!-- MAIN WEATHER -->

    <div class="weather-card">

      <h2 id="location">Pune</h2>

      <h1 id="temp">--°C</h1>

      <p id="desc">
        Real Time Weather
      </p>

      <div class="details">

        <div class="detail-box">
          <h3>Humidity</h3>
          <p id="humidity">--%</p>
        </div>

        <div class="detail-box">
          <h3>Wind</h3>
          <p id="wind">-- km/h</p>
        </div>

      </div>

    </div>

    <!-- FORECAST -->

    <h2 class="forecast-heading">
      7 Day Forecast
    </h2>

    <div id="forecast"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
